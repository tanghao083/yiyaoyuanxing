<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 易润健医疗订货系统</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 统一的Tailwind配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E40AF',
                        secondary: '#3B82F6',
                        accent: '#60A5FA',
                        neutral: '#F3F4F6',
                        'neutral-dark': '#1F2937',
                        'success': '#10B981',
                        'warning': '#F59E0B',
                        'danger': '#EF4444',
                        'admin-primary': '#059669',
                        'admin-secondary': '#10B981',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .transition-all-300 {
                transition: all 300ms ease-in-out;
            }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <div class="flex flex-col items-center mb-8">
                <div class="w-16 h-16 bg-admin-primary rounded-full flex items-center justify-center mb-4">
                    <span class="text-white text-2xl font-bold">A</span>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">易润健医疗订货系统</h1>
                <p class="text-gray-600 mt-2">管理员登录</p>
            </div>
            
            <form>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" placeholder="请输入用户名">
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" placeholder="请输入密码">
                </div>
                
                <button type="submit" class="w-full bg-admin-primary text-white py-3 rounded-md hover:bg-admin-primary/90 transition-colors">
                    登录
                </button>
            </form>
        </div>
    </div>
    
    <script>
        // 登录表单提交
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            // 模拟登录验证
            window.location.href = 'admin-index.html';
        });
    </script>
</body>
</html>
