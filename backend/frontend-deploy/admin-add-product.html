<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加商品 - 易润健医疗订货系统</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 统一的Tailwind配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E40AF',
                        secondary: '#3B82F6',
                        accent: '#60A5FA',
                        neutral: '#F3F4F6',
                        'neutral-dark': '#1F2937',
                        'success': '#10B981',
                        'warning': '#F59E0B',
                        'danger': '#EF4444',
                        'admin-primary': '#059669',
                        'admin-secondary': '#10B981',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .transition-all-300 {
                transition: all 300ms ease-in-out;
            }
            .shadow-card {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
            .sidebar-item {
                @apply flex items-center gap-3 px-4 py-3 rounded-lg transition-all-300;
            }
            .sidebar-item:hover {
                @apply bg-admin-primary/10 text-admin-primary;
            }
            .sidebar-item.active {
                @apply bg-admin-primary/20 text-admin-primary font-medium;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">
    <!-- 顶部导航栏 -->
    <header class="bg-admin-primary text-white shadow-md">
        <div class="container mx-auto px-6 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center">
                        <span class="text-admin-primary font-bold">A</span>
                    </div>
                    <h1 class="text-xl font-bold">易润健医疗订货系统 - 管理后台</h1>
                </div>
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2">
                        <i class="fa fa-bell text-white"></i>
                        <span>通知</span>
                    </div>
                    <div class="flex items-center gap-2 relative group">
                        <span>管理员</span>
                        <div class="flex items-center gap-1 cursor-pointer">
                            <i class="fa fa-chevron-down text-xs"></i>
                        </div>
                        <!-- 下拉菜单 -->
                        <div class="absolute right-0 top-full mt-2 w-48 bg-white shadow-lg rounded-md hidden group-hover:block z-50">
                            <div class="py-2">
                                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">个人信息</a>
                                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">账户安全</a>
                                <a href="admin-login.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">退出登录</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <div class="flex flex-1">
        <!-- 左侧菜单栏 -->
        <aside class="w-64 bg-white shadow-md fixed h-full overflow-y-auto">
            <div class="p-4">
                <h2 class="text-lg font-semibold mb-4">管理菜单</h2>
                <div class="space-y-2">
                    <a href="admin-index.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-dashboard text-xs"></i>
                        </div>
                        <span>仪表盘</span>
                    </a>
                    <a href="admin-users.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-users text-xs"></i>
                        </div>
                        <span>用户管理</span>
                    </a>
                    <a href="admin-products.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-cubes text-xs"></i>
                        </div>
                        <span>商品管理</span>
                    </a>
                    <a href="admin-add-product.html" class="sidebar-item active">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-plus text-xs"></i>
                        </div>
                        <span>添加商品</span>
                    </a>
                    <a href="admin-orders.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-file-text text-xs"></i>
                        </div>
                        <span>订单管理</span>
                    </a>
                    <a href="admin-inventory.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-archive text-xs"></i>
                        </div>
                        <span>库存管理</span>
                    </a>
                    <a href="admin-finance.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-money text-xs"></i>
                        </div>
                        <span>财务管理</span>
                    </a>
                    <a href="admin-settings.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-cog text-xs"></i>
                        </div>
                        <span>系统设置</span>
                    </a>
                </div>
            </div>
        </aside>

        <!-- 右侧内容区域 -->
        <main class="flex-1 ml-64 p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">添加商品</h2>
                <button type="button" class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 transition-colors flex items-center gap-2">
                    <i class="fa fa-upload"></i>
                    <span>批量导入</span>
                </button>
            </div>

            <!-- 添加商品表单 -->
            <div class="bg-white rounded-lg shadow-card p-6">
                <form class="space-y-6">
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">生产厂家 <span class="text-danger">*</span></label>
                            <select class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" id="manufacturer-select" onchange="updateProductNames()">
                                <option value="">请选择生产厂家</option>
                                <option value="北京科仪邦思">北京科仪邦思</option>
                                <option value="科森医疗（科森科技）">科森医疗（科森科技）</option>
                                <option value="家颖科技（PT MedTech）">家颖科技（PT MedTech）</option>
                                <option value="Segue Manufacturing（厦门）">Segue Manufacturing（厦门）</option>
                            </select>
                            <p class="text-xs text-gray-500 mt-1">数据来源于供货商资质管理</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">商品名称 <span class="text-danger">*</span></label>
                            <select class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" id="product-name-select">
                                <option value="">请先选择生产厂家</option>
                            </select>
                            <p class="text-xs text-gray-500 mt-1">数据来源于供货商资质管理</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">规格 <span class="text-danger">*</span></label>
                            <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" placeholder="请输入商品规格">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">分类 <span class="text-danger">*</span></label>
                            <select class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50">
                                <option value="">请选择分类</option>
                                <option value="强生">强生</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                    </div>

                    <div class="pt-6">
                        <h3 class="text-lg font-semibold mb-4">价格设置</h3>
                        <div class="grid grid-cols-3 gap-6 mb-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">统一价格 <span class="text-danger">*</span></label>
                                <input type="number" step="0.0001" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" placeholder="0.0000">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">优惠价格1</label>
                                <input type="number" step="0.0001" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" placeholder="0.0000">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">优惠价格2</label>
                                <input type="number" step="0.0001" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" placeholder="0.0000">
                            </div>
                        </div>
                        <p class="text-xs text-gray-500 mt-2">统一价格：统一对外展示的价格<br>优惠价格：单独开放给特定用户的价格</p>
                    </div>

                    <div class="grid grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">包装 <span class="text-danger">*</span></label>
                            <input type="number" min="1" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" placeholder="请输入包装数量（最小发货单位）" required>
                            <p class="text-xs text-gray-500 mt-1">默认包装为最小可发货单位，填写数值代表几个最小发货单位</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">库存 <span class="text-danger">*</span></label>
                            <input type="number" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" placeholder="请输入库存数量">
                        </div>
                    </div>
                    
                    <div class="pt-6">
                        <h3 class="text-lg font-semibold mb-4">返佣设置</h3>
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">统一返佣值 <span class="text-danger">*</span></label>
                                <input type="number" step="0.0001" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" placeholder="请输入统一返佣值">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">特定返佣值</label>
                                <input type="number" step="0.0001" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" placeholder="请输入特定返佣值">
                            </div>
                        </div>
                        <p class="text-xs text-gray-500 mt-2">统一返佣值：通用的返佣值<br>特定返佣值：特定给某些用户的返佣值</p>
                    </div>

                    <div class="pt-6">
                        <h3 class="text-lg font-semibold mb-4">资质信息 <span class="text-sm font-normal text-gray-500">（数据来源于供货商资质管理，选择生产厂家和商品名称后自动带出）</span></h3>
                        <div class="grid grid-cols-4 gap-4 mb-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">资质类型</label>
                                <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50 bg-gray-50" value="生产许可证" readonly>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">证件号</label>
                                <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50 bg-gray-50" id="license-number" placeholder="自动带出" readonly>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">有效期开始</label>
                                <input type="date" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50 bg-gray-50" id="license-start-date" readonly>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">有效期结束</label>
                                <input type="date" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50 bg-gray-50" id="license-end-date" readonly>
                            </div>
                        </div>
                        <div class="grid grid-cols-4 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">资质类型</label>
                                <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50 bg-gray-50" value="注册证" readonly>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">证件号</label>
                                <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50 bg-gray-50" id="registration-number" placeholder="自动带出" readonly>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">有效期开始</label>
                                <input type="date" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50 bg-gray-50" id="registration-start-date" readonly>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">有效期结束</label>
                                <input type="date" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50 bg-gray-50" id="registration-end-date" readonly>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-4 mt-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">套包 <span class="text-danger">*</span></label>
                            <div class="flex gap-4">
                                <label class="flex items-center gap-1">
                                    <input type="radio" name="package" value="是" class="text-admin-primary focus:ring-admin-primary/50">
                                    <span>是</span>
                                </label>
                                <label class="flex items-center gap-1">
                                    <input type="radio" name="package" value="否" class="text-admin-primary focus:ring-admin-primary/50" checked>
                                    <span>否</span>
                                </label>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">套餐 <span class="text-danger">*</span></label>
                            <div class="flex gap-4">
                                <label class="flex items-center gap-1">
                                    <input type="radio" name="set" value="是" class="text-admin-primary focus:ring-admin-primary/50">
                                    <span>是</span>
                                </label>
                                <label class="flex items-center gap-1">
                                    <input type="radio" name="set" value="否" class="text-admin-primary focus:ring-admin-primary/50" checked>
                                    <span>否</span>
                                </label>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">促销商品 <span class="text-danger">*</span></label>
                            <div class="flex gap-4">
                                <label class="flex items-center gap-1">
                                    <input type="radio" name="promotion" value="是" class="text-admin-primary focus:ring-admin-primary/50">
                                    <span>是</span>
                                </label>
                                <label class="flex items-center gap-1">
                                    <input type="radio" name="promotion" value="否" class="text-admin-primary focus:ring-admin-primary/50" checked>
                                    <span>否</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-end space-x-3 mt-6">
                        <button type="button" class="bg-gray-300 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-400 transition-colors">
                            取消
                        </button>
                        <button type="submit" class="bg-admin-primary text-white px-4 py-2 rounded-md hover:bg-admin-primary/90 transition-colors">
                            保存商品
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        // 侧边栏导航
        const sidebarItems = document.querySelectorAll('.sidebar-item');
        sidebarItems.forEach(item => {
            item.addEventListener('click', function(e) {
                sidebarItems.forEach(navItem => navItem.classList.remove('active'));
                this.classList.add('active');
                const href = this.getAttribute('href');
                if (href && href !== '#') {
                    window.location.href = href;
                }
            });
        });
        
        // 生产厂家与商品名称联动（数据来源于供货商资质管理）
        const manufacturerProductMap = {
            '北京科仪邦思': ['血栓抽吸导管'],
            '科森医疗（科森科技）': ['颅内支架'],
            '家颖科技（PT MedTech）': ['冠状动脉支架'],
            'Segue Manufacturing（厦门）': ['造影导管']
        };
        
        // 资质信息数据（数据来源于供货商资质管理）
        const certificationData = {
            '北京科仪邦思': {
                '血栓抽吸导管': {
                    licenseNumber: '京械注准20253170001',
                    licenseStartDate: '2025-01-01',
                    licenseEndDate: '2027-12-31',
                    registrationNumber: '国械注准20253170001',
                    registrationStartDate: '2025-01-01',
                    registrationEndDate: '2027-12-31'
                }
            },
            '科森医疗（科森科技）': {
                '颅内支架': {
                    licenseNumber: '苏械注准20253170002',
                    licenseStartDate: '2025-03-01',
                    licenseEndDate: '2026-03-31',
                    registrationNumber: '国械注准20253170002',
                    registrationStartDate: '2025-03-01',
                    registrationEndDate: '2026-03-31'
                }
            },
            '家颖科技（PT MedTech）': {
                '冠状动脉支架': {
                    licenseNumber: '粤械注准20253170003',
                    licenseStartDate: '2024-01-01',
                    licenseEndDate: '2026-01-31',
                    registrationNumber: '国械注准20253170003',
                    registrationStartDate: '2024-01-01',
                    registrationEndDate: '2026-01-31'
                }
            },
            'Segue Manufacturing（厦门）': {
                '造影导管': {
                    licenseNumber: '闽械注准20253170004',
                    licenseStartDate: '2025-06-01',
                    licenseEndDate: '2028-05-31',
                    registrationNumber: '国械注准20253170004',
                    registrationStartDate: '2025-06-01',
                    registrationEndDate: '2028-05-31'
                }
            }
        };
        
        function updateProductNames() {
            const manufacturerSelect = document.getElementById('manufacturer-select');
            const productNameSelect = document.getElementById('product-name-select');
            const selectedManufacturer = manufacturerSelect.value;
            
            // 清空商品名称下拉框
            productNameSelect.innerHTML = '';
            
            if (selectedManufacturer && manufacturerProductMap[selectedManufacturer]) {
                const products = manufacturerProductMap[selectedManufacturer];
                products.forEach(product => {
                    const option = document.createElement('option');
                    option.value = product;
                    option.textContent = product;
                    productNameSelect.appendChild(option);
                });
                // 自动带出资质信息
                updateCertificationInfo();
            } else {
                const option = document.createElement('option');
                option.value = '';
                option.textContent = '请先选择生产厂家';
                productNameSelect.appendChild(option);
                // 清空资质信息
                clearCertificationInfo();
            }
        }
        
        // 更新资质信息
        function updateCertificationInfo() {
            const manufacturerSelect = document.getElementById('manufacturer-select');
            const productNameSelect = document.getElementById('product-name-select');
            const manufacturer = manufacturerSelect.value;
            const product = productNameSelect.value;
            
            if (manufacturer && product && certificationData[manufacturer] && certificationData[manufacturer][product]) {
                const data = certificationData[manufacturer][product];
                document.getElementById('license-number').value = data.licenseNumber;
                document.getElementById('license-start-date').value = data.licenseStartDate;
                document.getElementById('license-end-date').value = data.licenseEndDate;
                document.getElementById('registration-number').value = data.registrationNumber;
                document.getElementById('registration-start-date').value = data.registrationStartDate;
                document.getElementById('registration-end-date').value = data.registrationEndDate;
            } else {
                clearCertificationInfo();
            }
        }
        
        // 清空资质信息
        function clearCertificationInfo() {
            document.getElementById('license-number').value = '';
            document.getElementById('license-start-date').value = '';
            document.getElementById('license-end-date').value = '';
            document.getElementById('registration-number').value = '';
            document.getElementById('registration-start-date').value = '';
            document.getElementById('registration-end-date').value = '';
        }
        
        // 监听商品名称变化
        document.getElementById('product-name-select').addEventListener('change', updateCertificationInfo);
        
        // 表单提交
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('商品添加成功！');
        });
    </script>
</body>
</html>
