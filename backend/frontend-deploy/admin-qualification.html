<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资质管理 - 易润健医疗订货系统</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 统一的Tailwind配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E40AF',
                        secondary: '#3B82F6',
                        accent: '#60A5FA',
                        neutral: '#F3F4F6',
                        'neutral-dark': '#1F2937',
                        'success': '#10B981',
                        'warning': '#F59E0B',
                        'danger': '#EF4444',
                        'admin-primary': '#059669',
                        'admin-secondary': '#10B981',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .transition-all-300 {
                transition: all 300ms ease-in-out;
            }
            .shadow-card {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
            .sidebar-item {
                @apply flex items-center gap-3 px-4 py-3 rounded-lg transition-all-300;
            }
            .sidebar-item:hover {
                @apply bg-admin-primary/10 text-admin-primary;
            }
            .sidebar-item.active {
                @apply bg-admin-primary/20 text-admin-primary font-medium;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">
    <!-- 顶部导航栏 -->
    <header class="bg-admin-primary text-white shadow-md">
        <div class="container mx-auto px-6 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center">
                        <span class="text-admin-primary font-bold">A</span>
                    </div>
                    <h1 class="text-xl font-bold">易润健医疗订货系统 - 管理后台</h1>
                </div>
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2">
                        <i class="fa fa-bell text-white"></i>
                        <span>通知</span>
                    </div>
                    <div class="flex items-center gap-2 relative group">
                        <span>管理员</span>
                        <div class="flex items-center gap-1 cursor-pointer">
                            <i class="fa fa-chevron-down text-xs"></i>
                        </div>
                        <!-- 下拉菜单 -->
                        <div class="absolute right-0 top-full mt-2 w-48 bg-white shadow-lg rounded-md hidden group-hover:block z-50">
                            <div class="py-2">
                                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">个人信息</a>
                                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">账户安全</a>
                                <a href="admin-login.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">退出登录</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <div class="flex flex-1">
        <!-- 左侧菜单栏 -->
        <aside class="w-64 bg-white shadow-md fixed h-full overflow-y-auto">
            <div class="p-4">
                <h2 class="text-lg font-semibold mb-4">管理菜单</h2>
                <div class="space-y-2">
                    <a href="admin-index.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-dashboard text-xs"></i>
                        </div>
                        <span>仪表盘</span>
                    </a>
                    <a href="admin-users.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-users text-xs"></i>
                        </div>
                        <span>用户管理</span>
                    </a>
                    <a href="admin-products.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-cubes text-xs"></i>
                        </div>
                        <span>商品管理</span>
                    </a>
                    <a href="admin-orders.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-file-text text-xs"></i>
                        </div>
                        <span>订单管理</span>
                    </a>
                    <a href="admin-inventory.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-archive text-xs"></i>
                        </div>
                        <span>库存管理</span>
                    </a>
                    <a href="admin-finance.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-money text-xs"></i>
                        </div>
                        <span>财务管理</span>
                    </a>
                    <a href="admin-supplier-certifications.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-certificate text-xs"></i>
                        </div>
                        <span>供货商资质管理</span>
                    </a>

                    <a href="admin-qualification.html" class="sidebar-item active">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-id-card text-xs"></i>
                        </div>
                        <span>资质管理</span>
                    </a>
                    <a href="admin-settings.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-admin-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-cog text-xs"></i>
                        </div>
                        <span>系统设置</span>
                    </a>
                </div>
            </div>
        </aside>

        <!-- 右侧内容区域 -->
        <main class="flex-1 ml-64 p-6">
            <!-- 页面标题 -->
            <section class="mb-6">
                <h2 class="text-lg font-semibold">资质管理</h2>
                <p class="text-sm text-gray-600 mt-1">管理商品相关的资质信息</p>
            </section>

            <!-- 资质管理卡片 -->
            <div class="bg-white rounded-lg shadow-card overflow-hidden mb-6">
                <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                    <h3 class="font-medium">资质列表</h3>
                    <button class="bg-admin-primary text-white px-4 py-2 rounded-md hover:bg-admin-primary/90 transition-colors flex items-center gap-1" onclick="openAddQualificationModal()">
                        <i class="fa fa-plus"></i>
                        <span>添加资质</span>
                    </button>
                </div>
                
                <!-- 资质列表 -->
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">ID</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">资质名称</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">证件号</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">有效期</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">状态</th>
                                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">
                            <tr>
                                <td class="px-4 py-3 text-sm">1</td>
                                <td class="px-4 py-3 text-sm">医疗器械经营许可证</td>
                                <td class="px-4 py-3 text-sm">ICT71125CA</td>
                                <td class="px-4 py-3 text-sm">2026-12-31</td>
                                <td class="px-4 py-3 text-sm">
                                    <span class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-800">有效</span>
                                </td>
                                <td class="px-4 py-3 text-sm">
                                    <button class="text-admin-primary hover:underline mr-2" onclick="openEditQualificationModal(1)">编辑</button>
                                    <button class="text-danger hover:underline" onclick="deleteQualification(1)">删除</button>
                                </td>
                            </tr>
                            <tr>
                                <td class="px-4 py-3 text-sm">2</td>
                                <td class="px-4 py-3 text-sm">医疗器械生产许可证</td>
                                <td class="px-4 py-3 text-sm">MDL2023001</td>
                                <td class="px-4 py-3 text-sm">2027-05-31</td>
                                <td class="px-4 py-3 text-sm">
                                    <span class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-800">有效</span>
                                </td>
                                <td class="px-4 py-3 text-sm">
                                    <button class="text-admin-primary hover:underline mr-2" onclick="openEditQualificationModal(2)">编辑</button>
                                    <button class="text-danger hover:underline" onclick="deleteQualification(2)">删除</button>
                                </td>
                            </tr>
                            <tr>
                                <td class="px-4 py-3 text-sm">3</td>
                                <td class="px-4 py-3 text-sm">药品经营许可证</td>
                                <td class="px-4 py-3 text-sm">YP2022001</td>
                                <td class="px-4 py-3 text-sm">2025-12-31</td>
                                <td class="px-4 py-3 text-sm">
                                    <span class="px-2 py-1 text-xs rounded-full bg-yellow-100 text-yellow-800">即将过期</span>
                                </td>
                                <td class="px-4 py-3 text-sm">
                                    <button class="text-admin-primary hover:underline mr-2" onclick="openEditQualificationModal(3)">编辑</button>
                                    <button class="text-danger hover:underline" onclick="deleteQualification(3)">删除</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- 分页 -->
                <div class="p-4 border-t flex justify-between items-center">
                    <div class="text-sm text-gray-600">
                        共 3 条记录
                    </div>
                    <div class="flex gap-2">
                        <button class="px-3 py-1 border border-gray-300 rounded-md text-sm disabled:opacity-50" disabled>上一页</button>
                        <button class="px-3 py-1 border border-admin-primary bg-admin-primary text-white rounded-md text-sm">1</button>
                        <button class="px-3 py-1 border border-gray-300 rounded-md text-sm disabled:opacity-50" disabled>下一页</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 添加资质模态框 -->
    <div id="addQualificationModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md">
            <div class="p-4 border-b flex justify-between items-center">
                <h3 class="font-medium">添加资质</h3>
                <button class="text-gray-400 hover:text-gray-600" onclick="closeAddQualificationModal()">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="p-6">
                <form id="addQualificationForm">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">资质名称 <span class="text-danger">*</span></label>
                        <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" placeholder="请输入资质名称" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">证件号 <span class="text-danger">*</span></label>
                        <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" placeholder="请输入证件号" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">有效期 <span class="text-danger">*</span></label>
                        <input type="date" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" required>
                    </div>
                    <div class="flex justify-end gap-2 mt-6">
                        <button type="button" class="px-4 py-2 border border-gray-300 rounded-md text-sm hover:bg-gray-50 transition-colors" onclick="closeAddQualificationModal()">取消</button>
                        <button type="submit" class="px-4 py-2 bg-admin-primary text-white rounded-md text-sm hover:bg-admin-primary/90 transition-colors">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 编辑资质模态框 -->
    <div id="editQualificationModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md">
            <div class="p-4 border-b flex justify-between items-center">
                <h3 class="font-medium">编辑资质</h3>
                <button class="text-gray-400 hover:text-gray-600" onclick="closeEditQualificationModal()">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="p-6">
                <form id="editQualificationForm">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">资质名称 <span class="text-danger">*</span></label>
                        <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" value="医疗器械经营许可证" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">证件号 <span class="text-danger">*</span></label>
                        <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" value="ICT71125CA" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">有效期 <span class="text-danger">*</span></label>
                        <input type="date" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-admin-primary/50" value="2026-12-31" required>
                    </div>
                    <div class="flex justify-end gap-2 mt-6">
                        <button type="button" class="px-4 py-2 border border-gray-300 rounded-md text-sm hover:bg-gray-50 transition-colors" onclick="closeEditQualificationModal()">取消</button>
                        <button type="submit" class="px-4 py-2 bg-admin-primary text-white rounded-md text-sm hover:bg-admin-primary/90 transition-colors">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 侧边栏导航
        const sidebarItems = document.querySelectorAll('.sidebar-item');
        sidebarItems.forEach(item => {
            item.addEventListener('click', function(e) {
                sidebarItems.forEach(navItem => navItem.classList.remove('active'));
                this.classList.add('active');
                const href = this.getAttribute('href');
                if (href && href !== '#') {
                    window.location.href = href;
                }
            });
        });

        // 模态框操作
        function openAddQualificationModal() {
            document.getElementById('addQualificationModal').classList.remove('hidden');
        }

        function closeAddQualificationModal() {
            document.getElementById('addQualificationModal').classList.add('hidden');
        }

        function openEditQualificationModal(id) {
            document.getElementById('editQualificationModal').classList.remove('hidden');
            // 这里可以根据ID加载资质数据
        }

        function closeEditQualificationModal() {
            document.getElementById('editQualificationModal').classList.add('hidden');
        }

        function deleteQualification(id) {
            if (confirm('确定要删除这个资质吗？')) {
                // 这里可以添加删除逻辑
                alert('资质已删除');
            }
        }

        // 表单提交
        document.getElementById('addQualificationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // 这里可以添加添加资质的逻辑
            alert('资质添加成功');
            closeAddQualificationModal();
        });

        document.getElementById('editQualificationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // 这里可以添加编辑资质的逻辑
            alert('资质更新成功');
            closeEditQualificationModal();
        });
    </script>
</body>
</html>
