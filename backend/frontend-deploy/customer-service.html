<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户服务 - 易润健医疗订货系统</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 统一的Tailwind配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E40AF',
                        secondary: '#3B82F6',
                        accent: '#60A5FA',
                        neutral: '#F3F4F6',
                        'neutral-dark': '#1F2937',
                        'success': '#10B981',
                        'warning': '#F59E0B',
                        'danger': '#EF4444',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .transition-all-300 {
                transition: all 300ms ease-in-out;
            }
            .shadow-card {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
            .sidebar-item {
                @apply flex items-center gap-3 px-4 py-3 rounded-lg transition-all-300;
            }
            .sidebar-item:hover {
                @apply bg-primary/10 text-primary;
            }
            .sidebar-item.active {
                @apply bg-primary/20 text-primary font-medium;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">
    <!-- 顶部导航栏 -->
    <header class="bg-primary text-white shadow-md">
        <div class="container mx-auto px-6 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-pink-300 rounded-full flex items-center justify-center">
                        <span class="text-white font-bold">M</span>
                    </div>
                    <h1 class="text-xl font-bold">易润健医疗订货</h1>
                </div>
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2">
                        <i class="fa fa-bell text-white"></i>
                        <span>我的消息</span>
                    </div>
                    <div class="flex items-center gap-2 relative group">
                        <span>河北xxx医疗器械有限公司</span>
                        <div class="flex items-center gap-1 cursor-pointer">
                            <span>孟大卫</span>
                            <i class="fa fa-chevron-down text-xs"></i>
                        </div>
                        <!-- 下拉菜单 -->
                        <div class="absolute right-0 top-full mt-2 w-48 bg-white shadow-lg rounded-md hidden group-hover:block z-50">
                            <div class="py-2">
                                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">个人信息</a>
                                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">账户安全</a>
                                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">资质管理</a>
                                <a href="login.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">退出登录</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <div class="flex flex-1">
        <!-- 左侧菜单栏 -->
        <aside class="w-64 bg-white shadow-md fixed h-full overflow-y-auto">
            <div class="p-4">
                <h2 class="text-lg font-semibold mb-4">主菜单</h2>
                <div class="space-y-2">
                    <a href="index.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-home text-xs"></i>
                        </div>
                        <span>首页</span>
                    </a>
                    <a href="order.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-search text-xs"></i>
                        </div>
                        <span>商品搜索</span>
                    </a>
                    <a href="order-center.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-file-text text-xs"></i>
                        </div>
                        <span>订单中心</span>
                    </a>
                    <a href="#" class="sidebar-item">
                        <div class="w-6 h-6 bg-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-shopping-cart text-xs"></i>
                        </div>
                        <span>我的购物车</span>
                    </a>
                    <a href="#" class="sidebar-item">
                        <div class="w-6 h-6 bg-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-list text-xs"></i>
                        </div>
                        <span>我的订单</span>
                    </a>
                    <a href="order.html" class="sidebar-item">
                        <div class="w-6 h-6 bg-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-plus-circle text-xs"></i>
                        </div>
                        <span>创建订单</span>
                    </a>
                    <a href="#" class="sidebar-item">
                        <div class="w-6 h-6 bg-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-exchange text-xs"></i>
                        </div>
                        <span>流向管理</span>
                    </a>
                    <a href="#" class="sidebar-item">
                        <div class="w-6 h-6 bg-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-archive text-xs"></i>
                        </div>
                        <span>库存查询</span>
                    </a>
                    <a href="customer-service.html" class="sidebar-item active">
                        <div class="w-6 h-6 bg-primary rounded flex items-center justify-center text-white">
                            <i class="fa fa-headphones text-xs"></i>
                        </div>
                        <span>客户服务</span>
                    </a>
                </div>
            </div>
        </aside>

        <!-- 右侧内容区域 -->
        <main class="flex-1 ml-64 p-6">


            <!-- 客户服务 -->
            <section class="bg-white rounded-lg shadow-md p-6 mb-6">
                <h2 class="text-lg font-semibold mb-4">客户服务</h2>
                
                <!-- 服务表单 -->
                <div class="max-w-3xl">
                    <form class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                                <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="请输入您的姓名">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">电话</label>
                                <input type="tel" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="请输入您的联系电话">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">问题类型</label>
                            <select class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50">
                                <option value="">请选择问题类型</option>
                                <option value="order">订单问题</option>
                                <option value="product">产品问题</option>
                                <option value="payment">支付问题</option>
                                <option value="delivery">配送问题</option>
                                <option value="other">其他问题</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">问题描述</label>
                            <textarea rows="5" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="请详细描述您遇到的问题"></textarea>
                        </div>

                        <div class="flex justify-end">
                            <button type="submit" class="bg-primary text-white px-6 py-2 rounded-md hover:bg-primary/90 transition-colors">
                                提交
                            </button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- 客服联系方式 -->
            <section class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-lg font-semibold mb-4">客服联系方式</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="flex items-center p-4 border border-gray-200 rounded-lg">
                        <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mr-4">
                            <i class="fa fa-phone text-primary text-xl"></i>
                        </div>
                        <div>
                            <h3 class="text-sm font-medium text-gray-700">客服电话</h3>
                            <p class="text-lg font-bold text-primary mt-1">400-123-4567</p>
                            <p class="text-xs text-gray-500 mt-1">周一至周日 9:00-18:00</p>
                        </div>
                    </div>
                    <div class="flex items-center p-4 border border-gray-200 rounded-lg">
                        <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center mr-4">
                            <i class="fa fa-weixin text-green-600 text-xl"></i>
                        </div>
                        <div>
                            <h3 class="text-sm font-medium text-gray-700">微信客服</h3>
                            <p class="text-lg font-bold text-primary mt-1">yirunjian2026</p>
                            <p class="text-xs text-gray-500 mt-1">工作日 9:00-18:00</p>
                        </div>
                    </div>
                    <div class="flex items-center p-4 border border-gray-200 rounded-lg">
                        <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center mr-4">
                            <i class="fa fa-envelope text-purple-600 text-xl"></i>
                        </div>
                        <div>
                            <h3 class="text-sm font-medium text-gray-700">邮箱客服</h3>
                            <p class="text-lg font-bold text-primary mt-1">service@yirunjian.com</p>
                            <p class="text-xs text-gray-500 mt-1">24小时内回复</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // 侧边栏导航
        const sidebarItems = document.querySelectorAll('.sidebar-item');
        sidebarItems.forEach(item => {
            item.addEventListener('click', function(e) {
                sidebarItems.forEach(navItem => navItem.classList.remove('active'));
                this.classList.add('active');
                const href = this.getAttribute('href');
                if (href && href !== '#') {
                    window.location.href = href;
                }
            });
        });
        
        // 表单提交
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('提交成功！我们会尽快处理您的问题。');
        });
    </script>
</body>
</html>
