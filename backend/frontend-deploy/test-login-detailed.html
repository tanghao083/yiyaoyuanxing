<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试登录</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .success {
            border-color: #4CAF50;
            background-color: #dff0d8;
        }
        .error {
            border-color: #f44336;
            background-color: #ffebee;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>测试登录功能</h1>
    <button onclick="testLogin()">测试登录</button>
    <div id="result" class="result"></div>

    <script>
        async function testLogin() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>正在测试登录...</p>';
            
            try {
                const response = await fetch('http://47.94.191.58:3001/api/users/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: 'testuser', password: 'test123' })
                });

                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h2>登录成功！</h2>
                        <p><strong>状态码:</strong> ${response.status}</p>
                        <p><strong>令牌:</strong> ${data.token}</p>
                        <p><strong>用户信息:</strong></p>
                        <pre>${JSON.stringify(data.user, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <h2>登录失败</h2>
                        <p><strong>状态码:</strong> ${response.status}</p>
                        <p><strong>错误信息:</strong> ${data.error}</p>
                        ${data.details ? `<p><strong>详细信息:</strong> ${data.details}</p>` : ''}
                        ${data.stack ? `<p><strong>堆栈跟踪:</strong></p><pre>${data.stack}</pre>` : ''}
                    `;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h2>网络错误</h2>
                    <p><strong>错误信息:</strong> ${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
